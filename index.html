<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cine Search Pro</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="search-wrapper">

    <input 
        type="text"
        id="search-input"
        placeholder="Search for a movie..."
        autocomplete="off"
    >

    <!-- The container that manages state (loading) -->
    <div id="results-container" data-loading="false">

        <!-- Spinner shows when data-loading="true" -->
        <div class="spinner"></div>

        <ul id="result-list"></ul>

    </div>

</div>

<!-- Template for each movie result -->
<template id="result-template">
<li class="movie-item" tabindex="0">
    <img
        class="result-poster"
        src=""
        alt=""
        style="width:50px;height:75px;object-fit:cover;"
    >
    <div class="title-container"></div>
    <span class="result-meta"></span>

</li>
</template>
<script src="script.js" type="module"></script>
</body>
</html>
